name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v0.1.0

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            cgo: 0
            artifact_name: QuietSnap-Windows-amd64.exe
            build_cmd: go build -tags desktop,production -ldflags="-H windowsgui -s -w" -o QuietSnap-Windows-amd64.exe
          - os: windows-latest
            arch: arm64
            cgo: 0
            artifact_name: QuietSnap-Windows-arm64.exe
            build_cmd: go build -tags desktop,production -ldflags="-H windowsgui -s -w" -o QuietSnap-Windows-arm64.exe
          - os: macos-14
            arch: amd64
            cgo: 1
            artifact_name: QuietSnap-macOS-intel
            build_cmd: go build -tags desktop,production -ldflags="-s -w" -o QuietSnap-macOS-intel
          - os: macos-14
            arch: arm64
            cgo: 1
            artifact_name: QuietSnap-macOS-arm64
            build_cmd: go build -tags desktop,production -ldflags="-s -w" -o QuietSnap-macOS-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install
        
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        
      - name: Build Backend
        run: ${{ matrix.build_cmd }}
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOARCH: ${{ matrix.arch }}
          
      - name: Package macOS App
        if: startsWith(matrix.os, 'macos')
        run: |
          APP_NAME="QuietSnap.app"
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"
          cp ${{ matrix.artifact_name }} "$APP_NAME/Contents/MacOS/QuietSnap"
          chmod +x "$APP_NAME/Contents/MacOS/QuietSnap"
          
          # Create Info.plist
          cat <<EOF > "$APP_NAME/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>QuietSnap</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundleIdentifier</key>
              <string>com.quietsnap.app</string>
              <key>CFBundleName</key>
              <string>QuietSnap</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Generate icon.icns from build/resources/appicon.png
          mkdir -p icon.iconset
          sips -z 16 16     build/resources/appicon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     build/resources/appicon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     build/resources/appicon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     build/resources/appicon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   build/resources/appicon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   build/resources/appicon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   build/resources/appicon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   build/resources/appicon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   build/resources/appicon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 build/resources/appicon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o "$APP_NAME/Contents/Resources/icon.icns"
          
          # Install create-dmg
          brew install create-dmg
          
          # Create DMG
          DMG_NAME="${{ matrix.artifact_name }}.dmg"
          create-dmg \
            --volname "QuietSnap" \
            --volicon "$APP_NAME/Contents/Resources/icon.icns" \
            --background "build/resources/dmg_background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "QuietSnap.app" 150 190 \
            --hide-extension "QuietSnap.app" \
            --app-drop-link 450 190 \
            "$DMG_NAME" \
            "$APP_NAME" || true
            
          # Fallback if create-dmg fails
          if [ ! -f "$DMG_NAME" ]; then
             hdiutil create -volname "QuietSnap" -srcfolder "$APP_NAME" -ov -format UDZO "$DMG_NAME"
          fi
          
          # Remove the raw binary so it isn't uploaded to the release
          rm ${{ matrix.artifact_name }}
          
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
